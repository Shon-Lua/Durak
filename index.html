<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Нейросетевой мужской голос (офлайн)</title>

<script src="https://cdn.jsdelivr.net/gh/coqui-ai/TTS@dev/web/dist/tts.min.js"></script>

<style>
body {
    background: #111;
    color: #fff;
    font-family: Arial, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    flex-direction: column;
}
button {
    padding: 15px 30px;
    font-size: 20px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    background: #4a8cff;
    color: white;
}
</style>
</head>
<body>

<h1>Современный мужской голос (офлайн)</h1>
<button id="speakBtn">Озвучить</button>

<script>
let tts;

async function init() {
    tts = new TTS({
        modelUrl: "https://huggingface.co/spaces/Plachta/VITS-Umamusume-RU/resolve/main/model.onnx",
        configUrl: "https://huggingface.co/spaces/Plachta/VITS-Umamusume-RU/resolve/main/config.json",
        vocoderUrl: "https://huggingface.co/spaces/Plachta/VITS-Umamusume-RU/resolve/main/vocoder.onnx"
    });

    await tts.init();
}

document.getElementById("speakBtn").onclick = async () => {
    const audio = await tts.speak("Привет! Это современный мужской голос.");
    const url = URL.createObjectURL(new Blob([audio], { type: "audio/wav" }));
    new Audio(url).play();
};

init();
</script>

</body>
</html>
