<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Современный мужской голос</title>
<script src="https://js.puter.com/v2/"></script>

<style>
body {
    background: #111;
    color: #fff;
    font-family: Arial, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    flex-direction: column;
}
button {
    padding: 15px 30px;
    font-size: 20px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    background: #4a8cff;
    color: white;
}
</style>
</head>
<body>

<h1>Нейросетевой мужской голос</h1>
<button id="speakBtn">Озвучить</button>

<script>
document.getElementById("speakBtn").onclick = async () => {
    const audio = await puter.ai.tts("Привет! Это современный мужской голос.");
    new Audio(audio.url).play();
};
</script>

</body>
</html>
