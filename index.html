<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Мужской голос TTS</title>
</head>
<body>

<button id="speakBtn">Озвучить</button>

<script>
function speakMale() {
  const voices = speechSynthesis.getVoices();
  const pavel = voices.find(v => v.name.includes("Pavel"));
  const utter = new SpeechSynthesisUtterance("Привет! Это мужской голос Павел.");
  if (pavel) utter.voice = pavel;
  speechSynthesis.speak(utter);
}

speechSynthesis.onvoiceschanged = () => {
  document.getElementById("speakBtn").onclick = speakMale;
};
</script>

</body>
</html>
