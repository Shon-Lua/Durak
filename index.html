<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Дурак 36 карт</title>
    <style>
        * {
            user-select: none;
            box-sizing: border-box;
        }
        body {
            background: radial-gradient(ellipse at 30% 20%, #1a3a2a, #0a1a12);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Georgia', 'Times New Roman', serif;
            margin: 0;
            padding: 20px;
            overflow-x: hidden;
        }
        .game-container {
            width: 100%;
            max-width: 1600px;
            position: relative;
            display: flex;
            flex-direction: column;
            height: 95vh;
        }
        .top-section {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 20px;
            position: relative;
        }
        .ai-area {
            flex: 1;
            text-align: center;
            min-height: 200px;
        }
        .ai-cards {
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .deck-section {
            position: relative;
            width: 160px;
            height: 220px;
            margin-right: 30px;
            cursor: pointer;
            transition: transform 0.1s;
        }
        .deck-section:active {
            transform: scale(0.97);
        }
        .deck-card {
            width: 130px;
            height: 182px;
            background: radial-gradient(circle at 35% 30%, #1f2a3e, #0f1422);
            border-radius: 16px;
            border: 2px solid #b89a6a;
            box-shadow: -8px 12px 20px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            position: absolute;
            top: 0;
            left: 0;
            transition: all 0.2s;
        }
        .deck-card::after {
            content: "🃟";
            font-size: 72px;
            color: #ddeeff;
            text-shadow: 0 0 5px #2266aa;
        }
        .trump-card {
            width: 130px;
            height: 182px;
            background: linear-gradient(145deg, #fff8ee, #f7e9d4);
            border-radius: 16px;
            box-shadow: -8px 12px 20px rgba(0,0,0,0.4);
            border: 2px solid #dbb87c;
            transform: rotate(90deg) translateX(-26px) translateY(26px);
            position: absolute;
            bottom: -60px;
            left: 50px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            z-index: 5;
        }
        .trump-card .card-rank {
            font-size: 48px;
            font-weight: 800;
            color: #2c2b26;
            line-height: 1;
        }
        .trump-card .card-suit {
            font-size: 68px;
            line-height: 1;
        }
        .deck-count {
            position: absolute;
            bottom: -35px;
            left: 20px;
            background: rgba(0,0,0,0.7);
            padding: 6px 18px;
            border-radius: 40px;
            color: #ffeaac;
            font-weight: bold;
            font-size: 1rem;
            backdrop-filter: blur(4px);
            white-space: nowrap;
        }
        .table-area {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 10px 0;
            position: relative;
            min-height: 240px;
        }
        .table-stack {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            background: rgba(0,0,0,0.2);
            padding: 15px 30px;
            border-radius: 60px;
            backdrop-filter: blur(2px);
        }
        .attack-stack, .defense-stack {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
        }
        .pair-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            background: rgba(0,0,0,0.3);
            padding: 8px 15px;
            border-radius: 40px;
            position: relative;
        }
        .pair-group .attack-card {
            margin-bottom: 5px;
        }
        .card {
            width: 130px;
            height: 182px;
            background: linear-gradient(145deg, #fffcf5, #fcf1e0);
            border-radius: 16px;
            box-shadow: -6px 10px 18px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,240,0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            transition: all 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            cursor: pointer;
            border: 1px solid #e2bc7c;
            will-change: transform;
        }
        .card.player-card:hover {
            transform: translateY(-15px) rotate(2deg);
            filter: brightness(1.02);
            box-shadow: 0 25px 30px rgba(0,0,0,0.6);
        }
        .card.ai-card {
            background: radial-gradient(circle at 35% 30%, #232e46, #121829);
            border: 1px solid #bfa16a;
            cursor: default;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card.ai-card::after {
            content: "🃟";
            font-size: 72px;
            color: #d2e6ff;
            opacity: 0.95;
        }
        .card.ai-card span { display: none; }
        .card-rank {
            font-size: 48px;
            font-weight: 800;
            color: #2c2b26;
            line-height: 1;
            font-family: 'Georgia', 'Times New Roman', serif;
        }
        .card-suit {
            font-size: 68px;
            line-height: 1;
            margin-top: 5px;
        }
        .table-card {
            width: 120px;
            height: 168px;
        }
        .attack-card {
            border-left: 6px solid #ff884d;
        }
        .defense-card {
            border-right: 6px solid #66ff99;
        }
        .player-area {
            margin-top: auto;
            text-align: center;
            padding: 15px 0 10px;
        }
        .player-cards {
            display: flex;
            justify-content: center;
            gap: 18px;
            flex-wrap: wrap;
            margin-bottom: 10px;
        }
        .action-buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 10px;
        }
        button {
            background: #2c2e3e;
            border: none;
            padding: 12px 32px;
            border-radius: 60px;
            font-weight: bold;
            font-size: 1.1rem;
            color: #ffefcf;
            cursor: pointer;
            transition: 0.1s;
            font-family: inherit;
            box-shadow: 0 4px 10px black;
        }
        button:active { transform: scale(0.96); }
        button:hover { background: #4a4e6e; }
        .info-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            background: transparent;
        }
        .status {
            background: rgba(0,0,0,0.6);
            padding: 8px 28px;
            border-radius: 40px;
            color: #f9e6c2;
            font-weight: bold;
            backdrop-filter: blur(4px);
            font-size: 1.1rem;
        }
        @keyframes drawCard {
            0% { transform: scale(0.8) rotate(-5deg); opacity: 0; }
            100% { transform: scale(1) rotate(0deg); opacity: 1; }
        }
        @keyframes throwCard {
            0% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-30px) rotate(10deg); }
            100% { transform: translateY(0) rotate(0deg); }
        }
        .card-animate-draw {
            animation: drawCard 0.2s ease-out;
        }
        .card-animate-throw {
            animation: throwCard 0.2s ease;
        }
        @media (max-width: 900px) {
            .card, .deck-card, .trump-card { width: 95px; height: 133px; }
            .table-card { width: 88px; height: 123px; }
            .card-rank { font-size: 36px; }
            .card-suit { font-size: 48px; }
            .deck-card::after { font-size: 52px; }
            .trump-card .card-rank { font-size: 36px; }
            .trump-card .card-suit { font-size: 48px; }
            .deck-section { width: 120px; height: 160px; }
            .trump-card { transform: rotate(90deg) translateX(-20px) translateY(20px); left: 40px; }
        }
    </style>
</head>
<body>
<div class="game-container">
    <div class="info-panel">
        <div class="status" id="gameStatus">Начало игры...</div>
        <button id="resetGameBtn">🔄 Новая игра</button>
    </div>

    <div class="top-section">
        <div class="ai-area">
            <div class="ai-cards" id="aiHandArea"></div>
        </div>
        <div class="deck-section" id="deckClickArea">
            <div class="deck-card"></div>
            <div class="trump-card" id="trumpCardDisplay">
                <div class="card-rank">♠</div>
                <div class="card-suit">♠</div>
            </div>
            <div class="deck-count">📜 <span id="deckCount">36</span></div>
        </div>
    </div>

    <div class="table-area">
        <div class="table-stack" id="tableCardsArea"></div>
    </div>

    <div class="player-area">
        <div class="player-cards" id="playerHandArea"></div>
        <div class="action-buttons">
            <button id="passButton">🏁 ЗАКОНЧИТЬ ХОД</button>
        </div>
    </div>
</div>

<script>
    const SUITS = ['♥', '♦', '♣', '♠'];
    const RANKS = ['6', '7', '8', '9', '10', 'В', 'Д', 'К', 'Т'];
    const RANK_VALUE = { '6':6,'7':7,'8':8,'9':9,'10':10,'В':11,'Д':12,'К':13,'Т':14 };
    let deck = [];
    let trumpSuit = '♠';
    let playerHand = [];
    let aiHand = [];
    let tablePairs = [];
    let currentAttacker = 'player';
    let phase = 'attack';
    let gameOver = false;

    const statusSpan = document.getElementById('gameStatus');
    const deckSpan = document.getElementById('deckCount');
    const trumpCardDiv = document.getElementById('trumpCardDisplay');
    const aiDiv = document.getElementById('aiHandArea');
    const playerDiv = document.getElementById('playerHandArea');
    const tableDiv = document.getElementById('tableCardsArea');
    const resetBtn = document.getElementById('resetGameBtn');
    const passBtn = document.getElementById('passButton');
    const deckClickArea = document.getElementById('deckClickArea');

    function shuffle(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    function buildDeck() {
        let newDeck = [];
        for (let suit of SUITS) {
            for (let rank of RANKS) {
                newDeck.push({ rank, suit, value: RANK_VALUE[rank] });
            }
        }
        return shuffle(newDeck);
    }

    function setTrump() {
        if (deck.length === 0) return;
        trumpSuit = deck[deck.length-1].suit;
        const suitSymbol = trumpSuit;
        trumpCardDiv.innerHTML = `<div class="card-rank">${suitSymbol}</div><div class="card-suit">${suitSymbol}</div>`;
    }

    function animateDraw(cardElement) {
        if (cardElement) cardElement.classList.add('card-animate-draw');
        setTimeout(() => { if(cardElement) cardElement.classList.remove('card-animate-draw'); }, 250);
    }

    function animateThrow(cardElement) {
        if (cardElement) cardElement.classList.add('card-animate-throw');
        setTimeout(() => { if(cardElement) cardElement.classList.remove('card-animate-throw'); }, 250);
    }

    function refillHands() {
        let drawn = false;
        while (playerHand.length < 6 && deck.length > 0) {
            playerHand.push(deck.pop());
            drawn = true;
        }
        while (aiHand.length < 6 && deck.length > 0) {
            aiHand.push(deck.pop());
            drawn = true;
        }
        if (drawn) updateUI();
        else updateUI();
    }

    function determineFirstAttacker() {
        let playerTrump = null, aiTrump = null;
        for (let c of playerHand) if (c.suit === trumpSuit) if (!playerTrump || c.value < playerTrump.value) playerTrump = c;
        for (let c of aiHand) if (c.suit === trumpSuit) if (!aiTrump || c.value < aiTrump.value) aiTrump = c;
        if (playerTrump && aiTrump) return (playerTrump.value <= aiTrump.value) ? 'player' : 'ai';
        if (playerTrump) return 'player';
        if (aiTrump) return 'ai';
        return Math.random() < 0.5 ? 'player' : 'ai';
    }

    function clearTable() {
        tablePairs = [];
        updateTableDisplay();
    }

    function canThrowMore(attackerHand) {
        if (tablePairs.length === 0) return false;
        let ranks = new Set();
        for (let p of tablePairs) {
            ranks.add(p.attack.rank);
            if (p.defense) ranks.add(p.defense.rank);
        }
        return attackerHand.some(c => ranks.has(c.rank));
    }

    function endRoundAndSwitch() {
        clearTable();
        currentAttacker = (currentAttacker === 'player') ? 'ai' : 'player';
        phase = 'attack';
        refillHands();
        if (gameOver) return;
        if (currentAttacker === 'player') statusSpan.innerText = '🎯 Ваш ход (атакуйте)';
        else statusSpan.innerText = '🤖 ИИ атакует...';
        updateUI();
        if (currentAttacker === 'ai' && !gameOver) setTimeout(() => aiMakeAttack(), 400);
    }

    function takeAllCards(defenderHand) {
        for (let p of tablePairs) {
            defenderHand.push(p.attack);
            if (p.defense) defenderHand.push(p.defense);
        }
        clearTable();
        refillHands();
        if (currentAttacker === 'player') statusSpan.innerText = 'ИИ взял карты. Продолжайте атаку!';
        else statusSpan.innerText = 'Вы взяли карты. Ход ИИ.';
        updateUI();
        if (!gameOver && currentAttacker === 'ai') setTimeout(() => aiMakeAttack(), 500);
    }

    function canBeat(attackCard, defenseCard) {
        if (defenseCard.suit === attackCard.suit) return defenseCard.value > attackCard.value;
        if (defenseCard.suit === trumpSuit && attackCard.suit !== trumpSuit) return true;
        return false;
    }

    function aiFindDefense(attackCard) {
        let sameSuit = aiHand.filter(c => c.suit === attackCard.suit && c.value > attackCard.value);
        if (sameSuit.length) {
            sameSuit.sort((a,b) => a.value - b.value);
            return sameSuit[0];
        }
        let trumpCards = aiHand.filter(c => c.suit === trumpSuit);
        if (trumpCards.length) {
            if (attackCard.suit !== trumpSuit) return trumpCards[0];
            else {
                let higher = trumpCards.filter(c => c.value > attackCard.value);
                if (higher.length) return higher[0];
            }
        }
        return null;
    }

    function aiDefend() {
        if (gameOver) return;
        if (currentAttacker !== 'player' || phase !== 'defense') return;
        const unprotectedIndex = tablePairs.findIndex(p => p.defense === null);
        if (unprotectedIndex === -1) {
            afterFullDefense();
            return;
        }
        const attackCard = tablePairs[unprotectedIndex].attack;
        const defenseCard = aiFindDefense(attackCard);
        if (defenseCard) {
            const idx = aiHand.findIndex(c => c === defenseCard);
            if (idx !== -1) aiHand.splice(idx, 1);
            tablePairs[unprotectedIndex].defense = defenseCard;
            updateUI();
            if (tablePairs.some(p => p.defense === null)) {
                setTimeout(() => aiDefend(), 200);
            } else {
                afterFullDefense();
            }
        } else {
            takeAllCards(aiHand);
        }
    }

    function afterFullDefense() {
        if (gameOver) return;
        const attackerHand = (currentAttacker === 'player') ? playerHand : aiHand;
        if (canThrowMore(attackerHand) && tablePairs.length < 12) {
            phase = 'attack';
            if (currentAttacker === 'player') {
                statusSpan.innerText = '✨ Подкиньте карту (совпадающий номинал) ✨';
                updateUI();
            } else {
                statusSpan.innerText = '🤖 ИИ подкидывает...';
                updateUI();
                setTimeout(() => aiThrowExtra(), 500);
            }
        } else {
            endRoundAndSwitch();
        }
    }

    function aiThrowExtra() {
        if (gameOver) return;
        if (currentAttacker !== 'ai' || phase !== 'attack') return;
        let ranksOnTable = new Set();
        for (let p of tablePairs) {
            ranksOnTable.add(p.attack.rank);
            if (p.defense) ranksOnTable.add(p.defense.rank);
        }
        let possible = aiHand.filter(c => ranksOnTable.has(c.rank));
        if (possible.length > 0 && tablePairs.length < 12) {
            const card = possible[0];
            const idx = aiHand.findIndex(c => c === card);
            aiHand.splice(idx, 1);
            tablePairs.push({ attack: card, defense: null });
            updateUI();
            statusSpan.innerText = '🤖 ИИ подкинул! Ваша защита...';
            setTimeout(() => playerDefendAgainstAI(), 200);
        } else {
            endRoundAndSwitch();
        }
    }

    function playerDefendAgainstAI() {
        if (gameOver) return;
        if (currentAttacker !== 'ai' || phase !== 'defense') return;
        const unprotected = tablePairs.findIndex(p => p.defense === null);
        if (unprotected === -1) {
            afterFullDefense();
            return;
        }
        const attackCard = tablePairs[unprotected].attack;
        statusSpan.innerText = `🛡️ Защититесь от ${attackCard.rank}${attackCard.suit} 🛡️`;
        updateUI();
    }

    function aiMakeAttack() {
        if (gameOver) return;
        if (currentAttacker !== 'ai' || phase !== 'attack') return;
        if (tablePairs.length !== 0) return;
        if (aiHand.length === 0) { checkGameOver(); return; }
        const randomIndex = Math.floor(Math.random() * aiHand.length);
        const card = aiHand[randomIndex];
        aiHand.splice(randomIndex, 1);
        tablePairs.push({ attack: card, defense: null });
        phase = 'defense';
        updateUI();
        statusSpan.innerText = '🛡️ ИИ атакует! Защититесь или возьмите (клик по колоде) 🛡️';
    }

    function playerAttack(card, cardElement) {
        if (gameOver) return;
        if (currentAttacker !== 'player') { statusSpan.innerText = "Сейчас не ваш ход атаки!"; return; }
        if (phase !== 'attack') { statusSpan.innerText = "Сейчас фаза защиты, отбивайтесь!"; return; }
        if (tablePairs.length === 0) {
            const idx = playerHand.findIndex(c => c === card);
            if (idx !== -1) playerHand.splice(idx, 1);
            tablePairs.push({ attack: card, defense: null });
            if (cardElement) animateThrow(cardElement);
            phase = 'defense';
            updateUI();
            statusSpan.innerText = "ИИ защищается...";
            setTimeout(() => aiDefend(), 200);
            return;
        }
        let ranksOnTable = new Set();
        for (let p of tablePairs) {
            ranksOnTable.add(p.attack.rank);
            if (p.defense) ranksOnTable.add(p.defense.rank);
        }
        if (!ranksOnTable.has(card.rank)) {
            statusSpan.innerText = "❌ Можно подкидывать только те же номиналы, что на столе!";
            return;
        }
        if (tablePairs.length >= 12) {
            statusSpan.innerText = "Стол переполнен!";
            return;
        }
        const idx = playerHand.findIndex(c => c === card);
        if (idx !== -1) playerHand.splice(idx, 1);
        tablePairs.push({ attack: card, defense: null });
        if (cardElement) animateThrow(cardElement);
        phase = 'defense';
        updateUI();
        statusSpan.innerText = "ИИ защищается от новой атаки...";
        setTimeout(() => aiDefend(), 200);
    }

    function playerDefend(card, cardElement) {
        if (gameOver) return;
        if (currentAttacker !== 'ai') { statusSpan.innerText = "Сейчас не ваша защита!"; return; }
        if (phase !== 'defense') { statusSpan.innerText = "Сейчас фаза атаки!"; return; }
        const unprotectedIdx = tablePairs.findIndex(p => p.defense === null);
        if (unprotectedIdx === -1) {
            statusSpan.innerText = "Нет незащищённых карт!";
            return;
        }
        const attackCard = tablePairs[unprotectedIdx].attack;
        if (!canBeat(attackCard, card)) {
            statusSpan.innerText = `❌ ${card.rank}${card.suit} не бьёт ${attackCard.rank}${attackCard.suit}!`;
            return;
        }
        const idx = playerHand.findIndex(c => c === card);
        if (idx !== -1) playerHand.splice(idx, 1);
        tablePairs[unprotectedIdx].defense = card;
        if (cardElement) animateThrow(cardElement);
        updateUI();
        if (tablePairs.every(p => p.defense !== null)) {
            afterFullDefense();
        } else {
            statusSpan.innerText = "✅ Отбито! Защитите следующую карту...";
            if (currentAttacker === 'ai' && phase === 'defense') {
                setTimeout(() => playerDefendAgainstAI(), 100);
            }
        }
    }

    function playerTakeFromDeck() {
        if (gameOver) return;
        if (currentAttacker !== 'ai' || phase !== 'defense') {
            statusSpan.innerText = "Сейчас нельзя взять карты! (только в фазе защиты против ИИ)";
            return;
        }
        takeAllCards(playerHand);
        currentAttacker = 'ai';
        phase = 'attack';
        statusSpan.innerText = "Вы взяли карты. Ход ИИ.";
        refillHands();
        if (!gameOver) setTimeout(() => aiMakeAttack(), 500);
        updateUI();
    }

    function finishAttack() {
        if (gameOver) return;
        if (currentAttacker !== 'player') { statusSpan.innerText = "Сейчас не ваш ход!"; return; }
        if (phase !== 'attack') { statusSpan.innerText = "Сейчас фаза защиты!"; return; }
        if (tablePairs.length === 0) { statusSpan.innerText = "Нет карт на столе. Начните атаку!"; return; }
        if (tablePairs.some(p => p.defense === null)) {
            statusSpan.innerText = "❌ Сначала добейте защиту! Отбейтесь или возьмите карты.";
            return;
        }
        endRoundAndSwitch();
    }

    function updateTableDisplay() {
        tableDiv.innerHTML = '';
        if (tablePairs.length === 0) return;
        const container = document.createElement('div');
        container.style.display = 'flex';
        container.style.flexWrap = 'wrap';
        container.style.justifyContent = 'center';
        container.style.gap = '20px';
        for (let i = 0; i < tablePairs.length; i++) {
            const pair = tablePairs[i];
            const group = document.createElement('div');
            group.className = 'pair-group';
            const attackDiv = document.createElement('div');
            attackDiv.className = 'card table-card attack-card';
            attackDiv.innerHTML = `<div class="card-rank">${pair.attack.rank}</div><div class="card-suit">${pair.attack.suit}</div>`;
            group.appendChild(attackDiv);
            if (pair.defense) {
                const defDiv = document.createElement('div');
                defDiv.className = 'card table-card defense-card';
                defDiv.innerHTML = `<div class="card-rank">${pair.defense.rank}</div><div class="card-suit">${pair.defense.suit}</div>`;
                group.appendChild(defDiv);
            } else {
                const empty = document.createElement('div');
                empty.style.width = '120px';
                empty.style.height = '168px';
                empty.style.background = '#1e1a2eaa';
                empty.style.borderRadius = '16px';
                empty.style.border = '2px dashed #ffaa66';
                empty.style.display = 'flex';
                empty.style.alignItems = 'center';
                empty.style.justifyContent = 'center';
                empty.style.color = '#ddccaa';
                empty.innerText = '❓';
                group.appendChild(empty);
            }
            container.appendChild(group);
        }
        tableDiv.appendChild(container);
    }

    function updateUI() {
        playerDiv.innerHTML = '';
        playerHand.forEach(card => {
            const cardDiv = document.createElement('div');
            cardDiv.className = 'card player-card';
            cardDiv.innerHTML = `<div class="card-rank">${card.rank}</div><div class="card-suit">${card.suit}</div>`;
            cardDiv.onclick = (e) => {
                e.stopPropagation();
                if (gameOver) return;
                if (currentAttacker === 'player' && phase === 'attack') playerAttack(card, cardDiv);
                else if (currentAttacker === 'ai' && phase === 'defense') playerDefend(card, cardDiv);
                else statusSpan.innerText = "Сейчас нельзя сыграть этой картой.";
            };
            playerDiv.appendChild(cardDiv);
        });
        aiDiv.innerHTML = '';
        for (let i = 0; i < 6; i++) {
            const back = document.createElement('div');
            back.className = 'card ai-card';
            aiDiv.appendChild(back);
        }
        updateTableDisplay();
        deckSpan.innerText = deck.length;
        if (gameOver) {
            passBtn.disabled = true;
        } else {
            passBtn.disabled = !(currentAttacker === 'player' && phase === 'attack');
        }
        checkGameOver();
    }

    function checkGameOver() {
        if (playerHand.length === 0 && !gameOver) {
            gameOver = true;
            statusSpan.innerText = '🏆 ВЫ ПОБЕДИЛИ! 🏆';
            updateUI();
        } else if (aiHand.length === 0 && !gameOver) {
            gameOver = true;
            statusSpan.innerText = '😭 ВЫ ДУРАК... ИИ победил.';
            updateUI();
        }
        return gameOver;
    }

    function newGame() {
        deck = buildDeck();
        setTrump();
        playerHand = [];
        aiHand = [];
        for (let i = 0; i < 6; i++) {
            if (deck.length) playerHand.push(deck.pop());
            if (deck.length) aiHand.push(deck.pop());
        }
        tablePairs = [];
        gameOver = false;
        currentAttacker = determineFirstAttacker();
        phase = 'attack';
        if (currentAttacker === 'player') statusSpan.innerText = '🎯 Вы атакуете первым!';
        else statusSpan.innerText = '🤖 ИИ начинает атаку...';
        refillHands();
        updateUI();
        if (!gameOver && currentAttacker === 'ai') setTimeout(() => aiMakeAttack(), 500);
    }

    passBtn.onclick = () => finishAttack();
    resetBtn.onclick = () => newGame();
    deckClickArea.onclick = () => playerTakeFromDeck();

    newGame();
</script>
</body>
</html>
